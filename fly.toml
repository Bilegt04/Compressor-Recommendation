# Fly.io config (alternative to Render). Usage:
#   fly launch --no-deploy --copy-config
#   fly deploy
#
# Edit `app = "..."` to a globally-unique name before launching.

app = "image-compression-recommender"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  ENABLE_OAM_FEATURES = "false"
  MAX_UPLOAD_BYTES = "26214400"
  CORS_ORIGINS = "*"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    method = "GET"
    path = "/health"
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
